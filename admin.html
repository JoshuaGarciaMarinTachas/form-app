<!doctype html>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Panel Administrativo</title>

    <link rel="stylesheet" href="./css/admin.css" />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div>
          <h2>Admin Panel</h2>

          <nav>
            <button class="menu-btn active">
              Solicitudes
            </button>
          </nav>
        </div>

        <button id="logout" class="logout-btn">
          Cerrar sesión
        </button>
      </aside>

      <!-- CONTENIDO -->
      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Solicitudes de Eventos</h1>
            <p>
              Gestión y administración de eventos
            </p>
          </div>
        </header>

        <section class="controls">
          <div class="status-card">

        <div class="status-info">
          <span class="status-label">
            Recepción de solicitudes
          </span>

          <p class="status-description">
            Controla si los usuarios pueden enviar
            nuevas solicitudes de eventos.
          </p>
        </div>

        <label class="switch">
          <input type="checkbox" id="toggleForm" />

          <span class="slider"></span>
        </label>

      </div>

          <input
            type="text"
            id="buscador"
            placeholder="Buscar evento..."
            autocomplete="off"
          />
        </section>

        <section class="tabla-wrapper">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
